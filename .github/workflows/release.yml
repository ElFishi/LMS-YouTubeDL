name: Release Plugin

on:
  push:
    tags:
      - "*" # Triggers on matching tags

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Plugin Name from Repository
        id: repo
        run: |
          # Get repository name and strip LMS- prefix
          REPO_NAME="${{ github.event.repository.name }}"
          PLUGIN_NAME="${REPO_NAME#LMS-}"
          echo "plugin_name=$PLUGIN_NAME" >> $GITHUB_OUTPUT
          echo "Repository: $REPO_NAME → Plugin: $PLUGIN_NAME"

      - name: Extract Version Info
        id: vars
        run: |
          # Grabs the version between <version>...</version> in plugin/install.xml
          XML_VERSION=$(grep -oP '(?<=<version>).*?(?=</version>)' plugin/install.xml)
          TAG_NAME=${GITHUB_REF#refs/tags/}
          # Combine them for a unique filename
          FULL_VERSION="${XML_VERSION}.${TAG_NAME}"

          echo "xml_version=$XML_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT

      - name: Bundle Plugin
        run: |
          PLUGIN_NAME="${{ steps.repo.outputs.plugin_name }}"
          
          # Create a folder with plugin name
          mkdir -p release/${PLUGIN_NAME}
          cp -r plugin/* release/${PLUGIN_NAME}/

          # Inject custom version in install.xml
          TARGET_XML="release/${PLUGIN_NAME}/install.xml"
          sed -i "s|<version>.*</version>|<version>${{ steps.vars.outputs.full_version }}</version>|" $TARGET_XML

          # Zip it up using the plugin name
          cd release
          zip -r ../${PLUGIN_NAME}-${{ steps.vars.outputs.full_version }}.zip ${PLUGIN_NAME}/

      - name: Generate SHA1 Checksum
        id: checksum
        run: |
          PLUGIN_NAME="${{ steps.repo.outputs.plugin_name }}"
          SHA=$(sha1sum ${PLUGIN_NAME}-${{ steps.vars.outputs.full_version }}.zip | awk '{ print $1 }')
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.repo.outputs.plugin_name }}-${{ steps.vars.outputs.full_version }}.zip
          name: Release ${{ steps.vars.outputs.full_version }}
          body: |
            ### LMS Plugin Release
            **Plugin:** ${{ steps.repo.outputs.plugin_name }}
            **Internal Version:** ${{ steps.vars.outputs.xml_version }}
            **Git Tag:** ${{ steps.vars.outputs.tag }}
            **SHA1 Checksum:** `${{ steps.checksum.outputs.sha }}`

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show Manual XML Info
        run: |
          PLUGIN_NAME="${{ steps.repo.outputs.plugin_name }}"
          echo "--- DATA FOR REPO.XML ---"
          echo "    <plugin version=\"${{ steps.vars.outputs.full_version }}\" name=\"${PLUGIN_NAME}\" minTarget=\"7.5\" maxTarget=\"*\">"
          echo "      <sha>${{ steps.checksum.outputs.sha }}</sha>"
          echo "      <url>https://github.com/${{ github.repository }}/releases/download/${{ steps.vars.outputs.tag }}/${PLUGIN_NAME}-${{ steps.vars.outputs.full_version }}.zip</url>"
          